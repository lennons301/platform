name: interlude
description: Agent-first remote development platform
category: infrastructure
repo: lennons301/interlude
status: active
package_manager: pnpm

choices:
  hosting: self-hosted-hetzner
  database: sqlite
  auth: none
  secrets: env-file
  ui: shadcn-tailwind
  dev_environment: mise-just
  linting: biome
  observability: sentry
  ci_cd: github-actions

versions:
  node: "22"
  next: "16"
  react: "19"
  typescript: "5.7"
  pnpm: "9"

architecture:
  diagrams:
    - context
    - containers
    - components-agent-runtime
    - deployment
    - dynamic-ci
  staleness_paths:
    - docker-compose.yml
    - Dockerfile
    - infrastructure/

divergences:
  - standard: hosting
    choice: self-hosted-hetzner
    reason: >
      Development platform needs Docker daemon access and persistent containers.
      Serverless hosting is architecturally incompatible.
  - standard: secrets
    choice: env-file
    reason: >
      Single VPS deployment. Doppler adds complexity with no benefit
      when there is one deploy target.
  - standard: linting
    choice: eslint
    reason: >
      Pending migration to Biome. Project still on the Next.js default ESLint
      setup from scaffold; not yet prioritised over feature work.
  - standard: dev-environment
    choice: none
    reason: >
      Pending adoption of mise + just. Project currently relies on global
      Node/pnpm installs and package.json scripts.
